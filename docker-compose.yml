version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: botguard
      POSTGRES_PASSWORD: botguard
      POSTGRES_DB: botguard
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://botguard:botguard@db:5432/botguard
      ALLOWED_ORIGINS: http://localhost:5173
      PROMETHEUS_METRICS_ENABLED: "true"
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db_data:

